[defaults]
inventory            = inventory.ini
roles_path           = roles
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = default
result_format        = yaml
interpreter_python   = auto_silent
force_color          = True

[inventory]
# Keep the built-in static plugins enabled (ini/yaml/host_list) alongside the
# dynamic aws_ec2 one. Listing only aws_ec2 here disables the built-ins, which
# breaks the static inventory.ini and stops group_vars/all.yml from loading.
enable_plugins = host_list, script, auto, yaml, ini, toml, amazon.aws.aws_ec2
