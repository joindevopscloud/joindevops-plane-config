---
# Upper bounds matter: the joindevops AMI ships ansible-core 2.15, but the
# latest collections (amazon.aws 9+, community.docker 4+, community.general 12+)
# require ansible-core 2.17+. These caps pin the last releases compatible with
# 2.15 so galaxy doesn't pull incompatible newer ones.
collections:
  - name: amazon.aws
    version: ">=8.0.0,<9.0.0"
  - name: community.docker
    version: ">=3.10.0,<4.0.0"
  - name: community.general
    version: ">=9.0.0,<10.0.0"

# Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# amazon.aws is still required in local mode: the plane-bootstrap role reads
# SMTP creds + the S3 bucket name from SSM Parameter Store (a secrets store,
# not Session Manager) via the aws_ssm lookup.
#
# The (optional, deprecated) remote mode in inventory/aws_ec2.yml would also
# need the AWS `session-manager-plugin` binary locally, but the supported path
# is now local mode over SSH/PuTTY.
